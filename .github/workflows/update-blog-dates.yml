name: Update Blog Published Dates

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "content/blogs/**"

permissions:
  contents: write

jobs:
  update-dates:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Get changed blog files
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep '^content/blogs/.*\.md$' || true)
          if [ -z "$files" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$files" > /tmp/changed-blogs.txt
          fi

      - name: Update date front matter
        if: steps.changed.outputs.skip == 'false'
        run: |
          today=$(date -u +%Y-%m-%d)
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              sed -i "2,/^---$/s/^date: \"[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\"/date: \"$today\"/" "$file"
            fi
          done < /tmp/changed-blogs.txt

      - name: Commit and push
        if: steps.changed.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blogs/
          if git diff --cached --quiet; then
            echo "No date changes needed"
          else
            git commit -m "docs: update blog published dates"
            git push
          fi
